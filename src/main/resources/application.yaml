# ========================================
# 공통 설정 (모든 프로필에 적용)
# ========================================
spring:
  application:
    name: library-app
  config:
    import: optional:file:./.env[.properties]
  profiles:
    active: dev

  # SQL 초기화 설정
  sql:
    init:
      mode: always
      platform: mysql
      encoding: UTF-8

# 서버 설정
server:
  servlet:
    context-path: /
  encoding:
    charset: UTF-8
    enabled: true
    force: true

---
# ========================================
# default 프로필 (프로필 미지정 시 기본 사용)
# ========================================
spring:
  config:
    activate:
      on-profile: default

  # MySQL 데이터베이스 설정
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 30_000
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 600_000
      pool-name: LibraryAPIHikariCP

# 기본 로깅 설정
logging:
  level:
    root: INFO
    com.bepo.libraryapp: INFO
    org.springframework.web: INFO

server:
  port: ${APP_PORT}

---
# ========================================
# dev 프로필 (개발 환경 - 상세 로깅)
# ========================================
spring:
  config:
    activate:
      on-profile: dev

  sql:
    init:
      mode: always

  # MySQL 데이터베이스 설정 (개발용)
  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 30_000
      maximum-pool-size: 10
      minimum-idle: 5
      idle-timeout: 600_000
      pool-name: LibraryAPIHikariCP-DEV
      # 개발 환경용 추가 설정
      register-mbeans: true
      connection-test-query: SELECT 1
      leak-detection-threshold: 60_000
      auto-commit: true
      # MySQL 드라이버 상세 로깅
      data-source-properties:
        logger: com.mysql.cj.log.Slf4JLogger
        profileSQL: true

  # JPA 설정 (개발용)
  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        use_sql_comments: true
    hibernate:
      ddl-auto: update

# 개발 환경 상세 로깅
logging:
  level:
    root: INFO
    com.bepo.libraryapp: DEBUG

    # Spring 프레임워크 로깅
    org.springframework.jdbc: DEBUG
    org.springframework.jdbc.core: DEBUG
    org.springframework.jdbc.datasource: TRACE
    org.springframework.boot.autoconfigure.jdbc: DEBUG

    # HikariCP 상세 로깅
    com.zaxxer.hikari: DEBUG
    com.zaxxer.hikari.HikariConfig: DEBUG
    com.zaxxer.hikari.HikariDataSource: DEBUG
    com.zaxxer.hikari.pool: DEBUG

    # MySQL 드라이버 로깅
    com.mysql.cj: DEBUG
    com.mysql.cj.jdbc: TRACE

  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

server:
  port: ${APP_PORT_DEV}

# 개발 도구 활성화
debug: false
trace: false

---
# ========================================
# prod 프로필 (운영 환경 - 최소 로깅)
# ========================================
spring:
  config:
    activate:
      on-profile: prod

  sql:
    init:
      mode: never

  # MySQL 데이터베이스 설정 (운영용)
  datasource:
    url: jdbc:mysql://${DB_PROD_HOST}:${DB_PROD_PORT}/${DB_NAME}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul&characterEncoding=UTF-8
    username: ${DB_PROD_USERNAME}
    password: ${DB_PROD_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      connection-timeout: 20_000
      maximum-pool-size: 20
      minimum-idle: 10
      idle-timeout: 300_000
      pool-name: LibraryAPIHikariCP-PROD
      max-lifetime: 1_800_000

# 운영 환경 로깅 (최소화)
logging:
  level:
    root: WARN
    com.bepo.libraryapp: INFO
    org.springframework: WARN
    com.zaxxer.hikari: WARN

  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger - %msg%n"
  file:
    name: logs/libraryapp.log
    max-size: 10MB
    max-history: 30

server:
  port: ${APP_PORT_PROD}

---
# ========================================
# test 프로필 (테스트 환경 - H2 인메모리 DB)
# ========================================
spring:
  config:
    activate:
      on-profile: test

  # H2 인메모리 데이터베이스 설정
  datasource:
    url: jdbc:h2:mem:${DB_NAME};MODE=MySQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
    hikari:
      connection-timeout: 10_000
      maximum-pool-size: 5
      minimum-idle: 2
      pool-name: LibraryAPIHikariCP-TEST

  # H2 콘솔 활성화
  h2:
    console:
      enabled: true
      path: /h2-console

  # JPA 설정 (테스트용)
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop
    show-sql: true

# 테스트 환경 로깅
logging:
  level:
    root: INFO
    com.bepo.libraryapp: DEBUG
    org.springframework.test: DEBUG
    org.springframework.jdbc: DEBUG
    com.zaxxer.hikari: INFO

server:
  port: ${APP_PORT_TEST}
